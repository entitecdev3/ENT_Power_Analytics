specVersion: "3.0"
metadata:
  name: poweranalytics.ui

type: application

framework:
  name: SAPUI5
  version: "1.120.0"
  libraries:
    - name: sap.m
    - name: sap.ui.core
    - name: sap.ui.layout
    - name: sap.f

resources:
  configuration:
    paths:
      webapp: app/webapp   

builder:
  resources:
    excludes:
      - "/test-resources/**"
      - "**/test-resources/**"
      - "**/sap/ui/**/demokit/**"
      - "**/sap/ui/**/sample/**"
